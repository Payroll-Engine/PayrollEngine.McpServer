name: Deploy DocFX to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure GitHub Packages source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/Payroll-Engine/index.json" \
            --name github --username github-actions \
            --password ${{ secrets.PAT_DISPATCH }} \
            --store-password-in-clear-text

      - name: Publish tools assembly
        run: dotnet publish Tools/PayrollEngine.McpServer.Tools.csproj -c Release -o publish

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build DocFX
        run: cd docfx && docfx docfx.pages.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docfx/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
